name: Publish to Pages

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache-dependency-path: package-lock.json
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        if: steps.cache_dependencies.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build pretext
        shell: bash
        run: |
          cd node_modules/@chenglou/pretext
          wget https://raw.githubusercontent.com/chenglou/pretext/a52268864195edc76d5f382d264dafb33f6be462/tsconfig.build.json
          wget https://raw.githubusercontent.com/chenglou/pretext/a52268864195edc76d5f382d264dafb33f6be462/tsconfig.json
          npx --package typescript@6.0.2 tsc -p tsconfig.build.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npx nx build showcase --base-href https://filipjezek.github.io/dortdb/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/testing/showcase/dist/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
