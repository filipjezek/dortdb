name: Publish to Pages

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache-dependency-path: package-lock.json
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        if: steps.cache_dependencies.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build pretext
        shell: bash
        run: |
          cd node_modules/@chenglou/pretext
          wget https://raw.githubusercontent.com/chenglou/pretext/a52268864195edc76d5f382d264dafb33f6be462/tsconfig.build.json
          wget https://raw.githubusercontent.com/chenglou/pretext/a52268864195edc76d5f382d264dafb33f6be462/tsconfig.json
          npx --package typescript@6.0.2 tsc -p tsconfig.build.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # The showcase is served under /dortdb/showcase/, so it needs a matching base href.
      - name: Build showcase
        run: npx nx build showcase --base-href https://filipjezek.github.io/dortdb/showcase/

      # Docs are served at the root /dortdb/. This runs `generate:api` then `docusaurus build`.
      - name: Build docs
        run: npm run build -w @dortdb/docs

      # Nest the showcase build inside the docs build so both ship in one artifact.
      - name: Combine docs and showcase
        run: cp -r packages/testing/showcase/dist/browser packages/docs/build/showcase

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/docs/build

  deploy:
    # Only publish on pushes to main; pull requests build for validation but must not deploy.
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
