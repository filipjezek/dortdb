          font-size: 12px;
          fill: #74777f;
          font-weight: normal;
        }
        rect {
          fill: #faf9fd;
          stroke: #74777f;
        }
        .groupby-content rect {
          stroke: #faf9fd !important;
          filter: none !important;
        }
        polygon {
          visibility: hidden;
        }
        line {
          stroke: #888888;
          stroke-width: 2px;
        }
        line.djoin {
          stroke-dasharray: 3;
        }
        line.group-op {
          stroke: #a65d1e;
        }
      </style>
