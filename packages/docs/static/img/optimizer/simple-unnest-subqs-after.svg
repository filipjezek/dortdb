      <style>
        
        svg.triangles polygon {
          visibility: visible;
        }
        svg * {
          paint-order: stroke;
          font-family: Georgia, Times, 'Times New Roman', serif;
          font-size: 15px;
        }
        svg *:not(text) {
          stroke-width: 2px;
        }
        svg text, svg tspan {
          stroke-width: 0;
        }
        .text-container {
          fill: #1a1b1f;
        }
        .text-container.source-tuple {
          font-weight: bold;
        }
        .text-container.source-item {
          font-weight: bold;
          font-style: italic;
        }
        .text-container .placeholder {
          fill: #546be8;
          font-weight: bold;
        }
        .text-container.groupby .placeholder {
          fill: #a65d1e;
        }
        .text-container .schema text, .text-container .schema tspan {
          font-size: 12px;
          fill: #74777f;
          font-weight: normal;
        }
        rect {
          fill: #faf9fd;
          stroke: #74777f;
        }
        .groupby-content rect {
          stroke: #faf9fd !important;
          filter: none !important;
        }
        polygon {
          visibility: hidden;
        }
        line {
          stroke: #888888;
          stroke-width: 2px;
        }
        line.djoin {
          stroke-dasharray: 3;
        }
        line.group-op {
          stroke: #a65d1e;
        }
      </style>
