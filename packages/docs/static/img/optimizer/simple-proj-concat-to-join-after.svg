          stroke: #74777f;
        }
        .groupby-content rect {
          stroke: #faf9fd !important;
          filter: none !important;
        }
        polygon {
          visibility: hidden;
        }
        line {
          stroke: #888888;
          stroke-width: 2px;
        }
        line.djoin {
