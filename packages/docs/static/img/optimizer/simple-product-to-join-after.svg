      <style>
        
        svg.triangles polygon {
          visibility: visible;
        }
        svg * {
          paint-order: stroke;
          font-family: Georgia, Times, 'Times New Roman', serif;
          font-size: 15px;
        }
        svg *:not(text) {
          stroke-width: 2px;
        }
        svg text, svg tspan {
          stroke-width: 0;
        }
        .text-container {
          fill: #1a1b1f;
        }
